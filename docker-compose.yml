services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - skillpulse
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    image: ${DOCKERHUB_USERNAME}/backend-app:latest
    build: ./backend
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_NAME: ${DB_NAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: "3306"
      port: "8080"
    networks:
    - skillpulse   
  frontend:
    image: ${DOCKERHUB_USERNAME}/frontend-app:latest
    build: ./frontend
    restart: unless-stopped
    ports:
    - "80:80"
    networks:
    - skillpulse
    depends_on:
    - backend
volumes:
  mysql_data:

networks:
  skillpulse:
  
