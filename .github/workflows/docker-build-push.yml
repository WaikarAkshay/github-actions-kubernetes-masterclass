name: Docker build image and push to remote repo 
on:
  workflow_call:
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: [backend, frontend]
    defaults:
      run:
        working-directory: ${{ matrix.folder }}
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: login docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: docker build and push
        uses: docker/build-push-action@v6
        with:
         context: .
         push: true
         tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.folder }}-app:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.folder }}-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.folder }}-app:${{ github.sha}} 
